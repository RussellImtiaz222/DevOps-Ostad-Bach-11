<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Tier Application - Frontend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .section {
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .section h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .response {
            margin-top: 15px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        
        .response.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .response.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
        }
        
        .info-item {
            background: white;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        
        .info-item label {
            margin: 0;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }
        
        .info-item .value {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>3-Tier Application</h1>
        <p class="subtitle">Frontend - Backend - Database Architecture on AWS</p>
        
        <!-- System Information Section -->
        <div class="section">
            <h2>System Information</h2>
            <button onclick="getSystemInfo()">Load System Info</button>
            <div id="systemResponse" class="response"></div>
            <div id="systemLoading" class="loading">
                <div class="spinner"></div>
                <p>Loading...</p>
            </div>
        </div>
        
        <!-- User Management Section -->
        <div class="section">
            <h2>User Management</h2>
            
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" placeholder="Enter first name">
            </div>
            
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" placeholder="Enter last name">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter email address">
            </div>
            
            <button onclick="createUser()">Create User</button>
            <div id="createResponse" class="response"></div>
            
            <button onclick="listUsers()" style="margin-top: 15px;">List All Users</button>
            <div id="listResponse" class="response"></div>
            <div id="usersLoading" class="loading">
                <div class="spinner"></div>
                <p>Loading...</p>
            </div>
        </div>
        
        <!-- Database Status Section -->
        <div class="section">
            <h2>Database Status</h2>
            <button onclick="getDBStatus()">Check Database</button>
            <div id="dbResponse" class="response"></div>
            <div id="dbLoading" class="loading">
                <div class="spinner"></div>
                <p>Connecting to database...</p>
            </div>
        </div>
        
        <!-- Health Check Section -->
        <div class="section">
            <h2>Application Health</h2>
            <button onclick="healthCheck()">Run Health Check</button>
            <div id="healthResponse" class="response"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin.replace(/:\d+$/, ':8080');

        async function makeRequest(endpoint, method = 'GET', data = null) {
            try {
                const options = {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                    }
                };
                
                if (data) {
                    options.body = JSON.stringify(data);
                }
                
                const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                throw new Error(`Request failed: ${error.message}`);
            }
        }

        function showResponse(elementId, message, isSuccess = true) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `response ${isSuccess ? 'success' : 'error'}`;
        }

        function hideLoading(elementId) {
            document.getElementById(elementId).style.display = 'none';
        }

        function showLoading(elementId) {
            document.getElementById(elementId).style.display = 'block';
        }

        async function getSystemInfo() {
            showLoading('systemLoading');
            try {
                const data = await makeRequest('/system-info');
                showResponse('systemResponse', 
                    `Server: ${data.server_version}\nDatabase: ${data.database}\nEnvironment: ${data.environment}`, 
                    true);
            } catch (error) {
                showResponse('systemResponse', `Error: ${error.message}`, false);
            } finally {
                hideLoading('systemLoading');
            }
        }

        async function createUser() {
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;

            if (!firstName || !lastName || !email) {
                showResponse('createResponse', 'Please fill in all fields', false);
                return;
            }

            try {
                const data = await makeRequest('/users', 'POST', {
                    first_name: firstName,
                    last_name: lastName,
                    email: email
                });
                
                showResponse('createResponse', `User created successfully! ID: ${data.user_id}`, true);
                document.getElementById('firstName').value = '';
                document.getElementById('lastName').value = '';
                document.getElementById('email').value = '';
            } catch (error) {
                showResponse('createResponse', `Error: ${error.message}`, false);
            }
        }

        async function listUsers() {
            showLoading('usersLoading');
            try {
                const data = await makeRequest('/users');
                let message = `Total Users: ${data.users.length}\n\n`;
                data.users.forEach((user, index) => {
                    message += `${index + 1}. ${user.first_name} ${user.last_name} (${user.email})\n`;
                });
                showResponse('listResponse', message || 'No users found', true);
            } catch (error) {
                showResponse('listResponse', `Error: ${error.message}`, false);
            } finally {
                hideLoading('usersLoading');
            }
        }

        async function getDBStatus() {
            showLoading('dbLoading');
            try {
                const data = await makeRequest('/db-status');
                showResponse('dbResponse', 
                    `Database Status: ${data.status}\nConnection: ${data.connection}\nDatabase Name: ${data.database}`, 
                    true);
            } catch (error) {
                showResponse('dbResponse', `Error: ${error.message}`, false);
            } finally {
                hideLoading('dbLoading');
            }
        }

        async function healthCheck() {
            try {
                const data = await makeRequest('/health');
                const message = `Status: ${data.status}\nUptime: ${data.uptime}s\nRequest Time: ${new Date().toLocaleString()}`;
                showResponse('healthResponse', message, data.status === 'healthy');
            } catch (error) {
                showResponse('healthResponse', `Error: ${error.message}`, false);
            }
        }

        // Auto-load system info on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded. API Base URL:', API_BASE_URL);
        });
    </script>
</body>
</html>
