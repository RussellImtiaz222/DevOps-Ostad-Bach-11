name: Terraform Plan & Apply

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'terraform/**'

env:
  TF_VERSION: 1.5.0
  AWS_REGION: us-east-1

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/
        continue-on-error: true
      
      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init
      
      - name: Terraform Validate
        working-directory: terraform/environments/dev
        run: terraform validate
      
      - name: Terraform Plan
        working-directory: terraform/environments/dev
        run: terraform plan -out=tfplan -var-file=terraform.tfvars
        env:
          TF_VAR_master_password: ${{ secrets.TF_VAR_MASTER_PASSWORD }}
      
      - name: Save Terraform Plan
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v3
        with:
          name: tfplan
          path: terraform/environments/dev/tfplan
      
      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/dev/tfplan', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${plan.substring(0, 3000)}\n\`\`\``
            });
        continue-on-error: true
      
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve -var-file=terraform.tfvars
        env:
          TF_VAR_master_password: ${{ secrets.TF_VAR_MASTER_PASSWORD }}
      
      - name: Export Terraform Outputs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: terraform/environments/dev
        run: terraform output -json > outputs.json
      
      - name: Upload Outputs Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v3
        with:
          name: terraform-outputs
          path: terraform/environments/dev/outputs.json
