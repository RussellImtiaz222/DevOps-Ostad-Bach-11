# CI Pipeline — React App
#
# Triggers on every push to the 'development' branch.
# Uses a self-hosted runner to install dependencies,
# run tests, and build the React application.

name: CI Pipeline

on:
  push:
    branches:
      - development

jobs:
  build-and-test:
    # Use a self-hosted runner instead of a GitHub-hosted runner.
    # The runner must be registered in your repository settings and
    # have Node.js installed before this workflow can execute.
    runs-on: self-hosted

    steps:
      # ── 1. Check out the repository code ──────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up the correct Node.js version ─────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install project dependencies ───────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Run automated tests ─────────────────────────────────────
      # react-scripts test is configured with --watchAll=false in
      # package.json so it exits after a single run (CI mode).
      - name: Run tests
        run: npm test

      # ── 5. Build the production bundle ────────────────────────────
      - name: Build application
        run: npm run build

      # ── 6. Upload the build artefact (optional but useful) ─────────
      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: build/
          retention-days: 7
